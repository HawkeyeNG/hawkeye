<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00482b" />
  <meta name="description" content="Hawkeye case file — one flagged result, its full evidence, and the crowd's verdicts." />
  <title>Hawkeye — Case File</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css?v=90" />
  <style>
    .chipst { font-weight: 700; padding: 2px 10px; border-radius: 999px; font-size: 0.78rem; }
    .chipst.open { background: var(--tint-danger); color: var(--danger); }
    .chipst.upheld { background: #7a1f1f; color: #fff; }
    .chipst.cleared { background: var(--tint-ok); color: var(--link); }
    .chipst.unresolved { background: var(--tint-warn); color: #b45309; }
    .flag { background: var(--tint-danger); border-left: 4px solid var(--danger); padding: 10px 12px; margin: 8px 0; font-size: 0.9rem; }
    .flag b { text-transform: uppercase; font-size: 0.78rem; letter-spacing: 0.03em; }
    .ev { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
    .ev a img { width: 100%; border: 1px solid var(--border); display: block; }
    .ev .cap { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; margin: 8px 0; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #e6e6e5; }
    .mono { font-family: monospace; font-size: 0.78rem; word-break: break-all; color: var(--muted); }
    .q { margin: 14px 0; }
    .q p { font-weight: 700; margin: 0 0 6px; }
    .q label { display: inline-flex; align-items: center; gap: 6px; margin-right: 16px; font-size: 0.92rem; }
    .q input { width: auto; margin: 0; }
    .tallybar { display: flex; height: 10px; border-radius: 5px; overflow: hidden; background: #eee; margin: 8px 0; }
    .tallybar i { display: block; }
    .verdict-box { border-top: 4px solid var(--green); }
    .note { font-size: 0.85rem; color: var(--muted); }
  </style>
</head>
<body>
  <header class="gov-header">
    <div class="wrap brand-row">
      <a class="brand" href="index.html" aria-label="Hawkeye home"><span class="crest" aria-hidden="true">🦅</span>
        <div class="brand-text"><strong>HAWKEYE</strong><span>Independent Election Results Monitor</span></div></a>
      <button class="menu-btn" aria-label="Menu" aria-expanded="false"
        onclick="const m=document.getElementById('menu-panel');const o=m.hidden;m.hidden=!o;this.setAttribute('aria-expanded',String(o));">&#9776;</button>
      <nav id="menu-panel" class="menu-panel" hidden>
        <a href="observe.html">Report a Result</a>
        <a href="results.html">National Leaderboard</a>
        <a href="dashboard.html">Unit Reports Log</a>
        <a href="ledger.html">Verify the Ledger</a>
        <a href="integrity.html">Election Integrity</a>
        <a href="docket.html">Public Docket</a>
        <a href="faq.html">FAQ</a>
        <a href="about.html">About & Contact</a>
      </nav>
    </div>
  </header>
  <div class="phase-banner"><div class="wrap"><strong>Case file</strong> — judge the evidence yourself. Your verdict joins the public record.</div></div>

  <main class="wrap">
    <p><a href="docket.html">← All cases</a></p>
    <h1 id="title">Case</h1>
    <p class="hint" id="meta"></p>
    <div id="flags"></div>

    <div class="card">
      <h2>Evidence</h2>
      <div id="evidence"><div class="skel" style="height:80px"></div></div>
    </div>

    <div class="card verdict-box">
      <h2>The crowd's verdict</h2>
      <div class="tallybar" id="tallybar"></div>
      <p class="note" id="tallytext"></p>
      <div id="judge"></div>
    </div>
  </main>

  <script src="device.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const qid = new URLSearchParams(location.search).get('id');
    const token = localStorage.getItem('hawkeye_token');
    const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    let CASE = null;

    function tally(t) {
      const tot = Math.max(1, t.total);
      $('tallybar').innerHTML =
        `<i style="width:${(t.fraudulent / tot) * 100}%;background:var(--danger)"></i>`
        + `<i style="width:${(t.legit / tot) * 100}%;background:var(--green)"></i>`
        + `<i style="width:${(t.inconclusive / tot) * 100}%;background:#b45309"></i>`;
      $('tallytext').textContent = `${t.total} verdict(s): ${t.fraudulent} fraudulent · ${t.legit} legit · ${t.inconclusive} inconclusive.`;
    }

    async function load() {
      const c = await fetch(`/api/docket/${qid}`).then((r) => r.json());
      if (c.error) { $('title').textContent = 'Case not found'; return; }
      CASE = c;
      $('title').innerHTML = `Case #${c.id} — ${esc(c.unit.name)} <span class="chipst ${c.status}">${c.status.toUpperCase()}</span>`;
      $('meta').textContent = `${c.contest} · ${c.unit.ward} ward, ${c.unit.lga}, ${c.unit.state}`
        + (c.unit.registeredVoters ? ` · ${c.unit.registeredVoters.toLocaleString()} registered voters` : '')
        + ` · ${c.status === 'open' ? 'closes ' + new Date(c.closesAt).toLocaleString() : 'resolved'}`;
      $('flags').innerHTML = c.flags.map((f) =>
        `<div class="flag"><b>${esc(f.type)}</b> — ${esc(f.detail.summary || '')}<br>
         <span class="note">${esc(f.detail.reason || '')}</span></div>`).join('');
      $('evidence').innerHTML = c.submissions.map((s) => `
        <h3>Report #${s.id} · ${new Date(s.capturedAt).toLocaleString()} · location ${s.locationVerified ? 'verified ✅' : 'unverified'}</h3>
        <div class="ev">
          <div><a href="${s.sheetUrl}" target="_blank" rel="noopener"><img loading="lazy" src="${s.sheetUrl}" alt="result sheet photo"></a><div class="cap">Result sheet (tap to open full size)</div></div>
          <div><a href="${s.venueUrl}" target="_blank" rel="noopener"><img loading="lazy" src="${s.venueUrl}" alt="venue photo"></a><div class="cap">Polling-unit surroundings</div></div>
        </div>
        <table><thead><tr><th>Party</th><th>Reported count</th></tr></thead><tbody>
          ${s.votes.filter((v) => v.count > 0).map((v) => `<tr><td>${esc(v.party)}</td><td>${v.count.toLocaleString()}</td></tr>`).join('') || '<tr><td colspan="2">all zeros</td></tr>'}
        </tbody></table>
        ${s.vision?.counts ? `<p class="note">AI read-back from the sheet: ${s.vision.counts.map((x) => `${esc(x.party)} ${x.count}`).join(', ')} <em>(advisory)</em></p>` : ''}
        ${s.ocr ? `<p class="note">OCR: ${s.ocr.matched}/${s.ocr.total} typed counts found on the sheet.</p>` : ''}
        <p class="mono">ledger entry ${s.entryHash} — re-verify the whole chain on <a href="ledger.html">the ledger page</a>.</p>`).join('<hr>');
      tally(c.tally);
      judgeUi(c);
    }

    async function judgeUi(c) {
      if (c.status !== 'open') { $('judge').innerHTML = '<p class="note">This case is closed. The record above is permanent.</p>'; return; }
      if (!token) {
        $('judge').innerHTML = '<p>Only verified observers can judge — one verdict per person, on the public record. <a href="observe.html">Become an observer →</a></p>';
        return;
      }
      const mine = await fetch(`/api/docket/${qid}/mine`, { headers: { authorization: `Bearer ${token}` } }).then((r) => r.json()).catch(() => ({}));
      if (mine.verdict) { $('judge').innerHTML = `<p class="note">You judged this case: <b>${esc(mine.verdict)}</b>. One verdict per person.</p>`; return; }
      const q = (name, text) => `<div class="q"><p>${text}</p>
        <label><input type="radio" name="${name}" value="yes"> Yes</label>
        <label><input type="radio" name="${name}" value="no"> No</label>
        <label><input type="radio" name="${name}" value="unsure"> Can't tell</label></div>`;
      $('judge').innerHTML =
        q('sheet', '1. Is the photographed sheet an official INEC EC8A result form?')
        + q('counts', '2. Do the figures written on the sheet match the reported counts above?')
        + q('flag', '3. This result was flagged for the reason shown at the top of this page. Looking at the evidence yourself, is that reason correct?')
        + '<button id="cast">Cast my verdict</button><p class="note" id="msg"></p>'
        + '<p class="note">Your answers compute the verdict by a published rule — you never pick a side directly.</p>';
      $('cast').onclick = async () => {
        const val = (n) => document.querySelector(`input[name="${n}"]:checked`)?.value;
        const body = { sheet: val('sheet'), counts: val('counts'), flag: val('flag') };
        if (!body.sheet || !body.counts || !body.flag) { $('msg').textContent = 'Answer all three questions.'; return; }
        $('cast').disabled = true;
        const r = await fetch(`/api/docket/${qid}/verdict`, {
          method: 'POST',
          headers: { 'content-type': 'application/json', authorization: `Bearer ${token}`, 'x-device-id': await getDeviceId() },
          body: JSON.stringify(body),
        }).then((x) => x.json()).catch(() => ({ error: 'network' }));
        if (r.ok) { $('msg').textContent = `Recorded — computed verdict: ${r.verdict}.`; tally(r.tally); $('judge').querySelectorAll('input,button').forEach((el) => { el.disabled = true; }); }
        else { $('msg').textContent = r.error === 'already_judged' ? 'You already judged this case.' : `Could not record (${r.error || 'error'}).`; $('cast').disabled = false; }
      };
    }
    load();
  </script>
  <script src="menu.js?v=90"></script>
</body>
</html>
