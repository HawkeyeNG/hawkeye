<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00482b" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Hawkeye — Review Console</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg?v=98" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css?v=97" />
  <script src="native.js?v=95"></script>
  <style>
    .tabs { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
    .tab { border: 1px solid var(--border); background: var(--card); padding: 6px 14px; border-radius: 999px; cursor: pointer; font-weight: 700; font-size: 0.9rem; }
    .tab.on { background: var(--green); color: #fff; border-color: var(--green); }
    .inc { background: var(--card); border: 1px solid var(--border); border-left: 5px solid var(--green); padding: 14px; margin-bottom: 12px; }
    .inc.pending { border-left-color: #d4770c; }
    .inc.rejected { border-left-color: var(--muted); opacity: 0.7; }
    .inc h3 { margin: 0 0 4px; font-size: 1.05rem; }
    .inc .meta { color: var(--muted); font-size: 0.82rem; }
    .inc .m { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
    .inc .m img, .inc .m video { width: 160px; height: 120px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
    .acts { display: flex; gap: 10px; margin-top: 8px; }
    .acts button { margin: 0; width: auto; }
    .btn-reject { background: #6b7280; box-shadow: 0 2px 0 #4b5563; }
    .btn-reject:hover { background: #4b5563; }
    .social { font-size: 0.8rem; color: var(--muted); margin-top: 6px; }
    #login { max-width: 380px; }
    .empty { color: var(--muted); padding: 20px; text-align: center; }
    .lab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; }
    .lab { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px; }
    .lab img { width: 100%; height: 170px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); display: block; }
    .lab .key { font-family: monospace; font-size: 0.74rem; color: var(--muted); margin: 6px 0 3px; }
    .lab .counts { font-size: 0.86rem; font-weight: 600; word-break: break-word; }
    .lab .counts em { font-style: normal; color: var(--muted); font-weight: 400; }
    .lab.ok { border-color: var(--green); }
    .lab .qa { display: flex; gap: 8px; margin-top: 8px; }
    .lab .qa button { margin: 0; width: auto; flex: 1; padding: 7px 0; font-size: 0.84rem; }
    .lab .okchip { font-size: 0.76rem; font-weight: 700; color: var(--link); }
  </style>
</head>
<body>
  <header class="gov-header">
    <div class="wrap brand-row">
      <span class="brand"><span class="crest" aria-hidden="true">🦅</span>
        <div class="brand-text"><strong>HAWKEYE</strong><span>Review Console — private</span></div></span>
    </div>
  </header>

  <main class="wrap">
    <section id="login" class="card">
      <h1>Review Console</h1>
      <p class="lede">Owner access only.</p>
      <label for="pass">Passphrase</label>
      <input id="pass" type="password" autocomplete="off" placeholder="Enter console passphrase" />
      <button id="btn-login">Unlock</button>
      <p id="login-status" class="status" role="status"></p>
    </section>

    <section id="console" hidden>
      <h1>Incident review</h1>
      <div class="tabs" id="tabs">
        <span class="tab on" data-s="pending">Pending <b id="c-pending"></b></span>
        <span class="tab" data-s="published">Published <b id="c-published"></b></span>
        <span class="tab" data-s="rejected">Rejected <b id="c-rejected"></b></span>
        <span class="tab" data-s="_logout" style="margin-left:auto">Lock 🔒</span>
      </div>
      <div id="list"><p class="empty">Loading…</p></div>

      <h1 style="margin-top:34px">Label review</h1>
      <p class="meta">Spot-check the counts each scorer typed against the sheet itself (tap a photo for full size).</p>
      <div class="tabs" id="set-tabs">
        <span class="tab on" data-set="3">Derek <b id="s3"></b></span>
        <span class="tab" data-set="4">Davina <b id="s4"></b></span>
        <span class="tab" data-set="1">Set 1 <b id="s1"></b></span>
        <span class="tab" data-set="2">Set 2 <b id="s2"></b></span>
      </div>
      <p class="meta" id="lab-summary"></p>
      <div id="lab-list"><p class="empty">Loading…</p></div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const KIND = {
      violence: 'Violence', ballot_snatching: 'Ballot snatching', vote_buying: 'Vote-buying',
      intimidation: 'Voter intimidation', bvas_failure: 'BVAS failure', late_materials: 'Late materials',
      obstruction: 'Obstruction of observers', other: 'Other irregularity',
    };
    let secret = sessionStorage.getItem('hawkeye_admin') || '';
    let tab = 'pending';
    const hdr = () => ({ 'x-admin-secret': secret });

    async function login() {
      secret = $('pass').value.trim();
      const r = await fetch('/api/admin/auth', { method: 'POST', headers: hdr() });
      if (r.ok) {
        sessionStorage.setItem('hawkeye_admin', secret);
        $('login').hidden = true; $('console').hidden = false;
        load(); loadLabels();
      } else {
        $('login-status').textContent = r.status === 403 ? 'Console is disabled (no passphrase set on server).' : 'Wrong passphrase.';
      }
    }
    $('btn-login').onclick = login;
    $('pass').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });

    async function load() {
      const r = await fetch(`/api/admin/incidents?status=${tab}`, { headers: hdr() });
      if (r.status === 401) { logout(); return; }
      const { incidents, counts } = await r.json();
      $('c-pending').textContent = counts.pending || 0;
      $('c-published').textContent = counts.published || 0;
      $('c-rejected').textContent = counts.rejected || 0;
      if (!incidents.length) { $('list').innerHTML = `<p class="empty">Nothing ${tab}.</p>`; return; }
      $('list').innerHTML = incidents.map((i) => {
        const media = (i.media || []).map((m) => m.type === 'video'
          ? `<video src="/uploads/${m.file}" controls muted></video>`
          : `<a href="/uploads/${m.file}" target="_blank"><img src="/uploads/${m.file}" alt="" /></a>`).join('');
        const gps = (i.lat != null && i.lng != null)
          ? ` · <a href="https://maps.google.com/?q=${i.lat},${i.lng}" target="_blank" rel="noopener">📍 map</a>` : '';
        const acts = tab === 'pending'
          ? `<div class="acts"><button onclick="act(${i.id},'publish')">Publish</button>
             <button class="btn-reject" onclick="act(${i.id},'reject')">Reject</button></div>` : '';
        return `<div class="inc ${i.status}">
          <h3>${KIND[i.kind] || i.kind}</h3>
          <div class="meta">#${i.id} · observer ${i.observer_id ?? '—'}${i.state ? ' · ' + i.state : ''}${i.pu_code ? ' · ' + i.pu_code : ''}${gps} · ${new Date(i.created_at).toLocaleString()}</div>
          ${i.description ? `<p>${i.description.replace(/</g, '&lt;')}</p>` : '<p class="meta">(no text)</p>'}
          ${i.ai ? `<div class="meta" style="border-left:3px solid #0a5c39;padding-left:8px">🤖 AI (advisory): ${(i.ai.summary || '').replace(/</g, '&lt;')} · kind: ${i.ai.kind}${i.ai.kind !== i.kind ? ' ⚠ differs' : ''} · urgency: ${i.ai.urgency} · spam: ${i.ai.spam}</div>` : ''}
          ${media ? `<div class="m">${media}</div>` : ''}
          ${acts}
        </div>`;
      }).join('');
    }

    window.act = async (id, action) => {
      if (action === 'reject' && !confirm('Reject and hide this report?')) return;
      const r = await fetch(`/api/admin/incidents/${id}/${action}`, { method: 'POST', headers: hdr() });
      await r.json().catch(() => ({}));
      load();
    };

    // ---- label review: truth.json (labels) x sets.json (who claimed what) ----
    let labSet = '3';
    async function loadLabels() {
      const bust = `?t=${Date.now()}`;
      const [truth, sets, dropped, approved] = await Promise.all([
        fetch('/training/truth.json' + bust).then((r) => r.json()).catch(() => ({})),
        fetch('/training/sets.json' + bust).then((r) => r.json()).catch(() => ({})),
        fetch('/training/dropped.json' + bust).then((r) => r.json()).catch(() => ({})),
        fetch('/training/approved.json' + bust).then((r) => r.json()).catch(() => ({})),
      ]);
      const bySet = {};
      for (const [file, s] of Object.entries(sets)) (bySet[s] = bySet[s] || []).push(file);
      for (const s of ['1', '2', '3', '4']) {
        const files = bySet[s] || [];
        const done = files.filter((f) => truth[f.replace(/\.[^.]+$/, '')]).length;
        const el = $('s' + s); if (el) el.textContent = `${done}/${files.length}`;
      }
      const files = bySet[labSet] || [];
      const rows = [];
      let done = 0, skipped = 0, ok = 0;
      for (const f of files) {
        const key = f.replace(/\.[^.]+$/, '');
        if (dropped[key]) { skipped++; continue; }
        const t = truth[key];
        if (!t) continue;
        done++;
        const isOk = Boolean(approved[key]);
        if (isOk) ok++;
        const counts = Object.entries(t).map(([p, n]) => `${p} ${n}`).join(', ') || '<em>all zero</em>';
        const qa = isOk
          ? `<div class="qa"><span class="okchip">✓ Approved for ML</span>
             <button class="btn-reject" onclick="qa('${key}','deny')">Deny</button></div>`
          : `<div class="qa"><button onclick="qa('${key}','approve')">Approve</button>
             <button class="btn-reject" onclick="qa('${key}','deny')">Deny</button></div>`;
        rows.push(`<div class="lab${isOk ? ' ok' : ''}"><a href="/training/${f}" target="_blank" rel="noopener">
          <img loading="lazy" src="/training/${f}" alt="sheet ${key}"></a>
          <div class="key">${key}</div><div class="counts">${counts}</div>${qa}</div>`);
      }
      $('lab-summary').textContent =
        `${done} labeled (${ok} approved for ML) · ${skipped} skipped as unusable · ${files.length - done - skipped} still in queue (of ${files.length} claimed)`;
      $('lab-list').innerHTML = rows.length ? `<div class="lab-grid">${rows.join('')}</div>` : '<p class="empty">No labeled sheets in this set yet.</p>';
    }
    window.qa = async (key, action) => {
      if (action === 'deny' && !confirm('Deny this label? It is deleted and the sheet returns to the open pool for re-labeling.')) return;
      const r = await fetch(`/api/training/${action}`, {
        method: 'POST',
        headers: { ...hdr(), 'content-type': 'application/json' },
        body: JSON.stringify({ key }),
      });
      if (r.status === 401) { logout(); return; }
      loadLabels();
    };

    $('set-tabs').addEventListener('click', (e) => {
      const t = e.target.closest('.tab'); if (!t) return;
      labSet = t.dataset.set;
      document.querySelectorAll('#set-tabs .tab').forEach((x) => x.classList.toggle('on', x === t));
      loadLabels();
    });

    function logout() { sessionStorage.removeItem('hawkeye_admin'); location.reload(); }
    $('tabs').addEventListener('click', (e) => {
      const t = e.target.closest('.tab'); if (!t) return;
      if (t.dataset.s === '_logout') return logout();
      tab = t.dataset.s;
      document.querySelectorAll('.tab').forEach((x) => x.classList.toggle('on', x === t));
      load();
    });

    if (secret) { $('login').hidden = true; $('console').hidden = false; load(); loadLabels(); }
  </script>
</body>
</html>
